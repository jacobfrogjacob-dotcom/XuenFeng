<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>玄封商店</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; }
        .logo { color: #3498db; font-weight: bold; font-size: 20px; }
        .coin { background: #fff3cd; padding: 8px 15px; border-radius: 20px; }
        .banner { background: #3498db; color: white; padding: 40px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { background: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .tab.active { background: #3498db; color: white; }
        .product { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🏪 玄封商店</div>
        <div class="coin">💰 <span id="xf">0</span> 玄封幣</div>
    </header>
    <div class="banner"><h1>玄封商店</h1></div>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="tab('shop')">商店</div>
            <div class="tab" onclick="tab('exchange')">兌換</div>
            <div class="tab" onclick="tab('claim')">每日</div>
        </div>
        <div id="shop"></div>
        <div id="exchange" style="display:none">
            <input id="ex" value="100" style="padding:10px"> <button class="btn" onclick="ex()">兌換</button>
        </div>
        <div id="claim" style="display:none">
            <button class="btn" style="font-size:18px" onclick="cl()">📩 領取50</button>
        </div>
    </div>
    <script>
        var db = window.supabase.createClient('https://chjuzpbocdkdiyuuziye.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanV6cGJvY2RraXl1eml5ZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2NDgxODMyMDAsImV4cCI6MTk2Mzc1OTYwMH0.NItpZOQLPR4jshwOA_ZzV27mJI');
        var c = localStorage.getItem('c') || 0;
        document.getElementById('xf').innerText = c;
        
        function tab(t) {
            document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
            event.target.classList.add('active');
            document.getElementById('shop').style.display = t === 'shop' ? 'block' : 'none';
            document.getElementById('exchange').style.display = t === 'exchange' ? 'block' : 'none';
            document.getElementById('claim').style.display = t === 'claim' ? 'block' : 'none';
            if (t === 'shop') load();
        }
        
        async function load() {
            try {
                var r = await db.from('products').select('name,price').eq('is_visible', 1);
                var h = '';
                (r.data || []).forEach(function(p) {
                    h += '<div class="product"><b>' + p.name + '</b><span>' + p.price + '代幣</span></div>';
                });
                document.getElementById('shop').innerHTML = h || '暫無商品';
            } catch(e) { document.getElementById('shop').innerHTML = '載入失敗'; }
        }
        
        function cl() {
            c = parseInt(c) + 50;
            localStorage.setItem('c', c);
            document.getElementById('xf').innerText = c;
            alert('+50代幣');
        }
        
        function ex() {
            var a = parseInt(document.getElementById('ex').value) || 0;
            if (c < a * 100) { alert('不足'); return; }
            c -= a * 100;
            localStorage.setItem('c', c);
            document.getElementById('xf').innerText = c;
            alert('兌換成功');
        }
        
        load();
    </script>
</body>
</html>
