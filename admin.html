<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>玄封商店 - 後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
        h2 { color: #333; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>📊 統計 <button class="btn" onclick="init()">刷新</button></h2>
    <div style="display:flex;gap:20px;margin:20px 0">
        <div style="background:white;padding:20px;border-radius:8px;text-align:center;flex:1"><b id="u" style="font-size:30px;color:#3498db">0</b><br>用戶</div>
        <div style="background:white;padding:20px;border-radius:8px;text-align:center;flex:1"><b id="p" style="font-size:30px;color:#3498db">0</b><br>商品</div>
        <div style="background:white;padding:20px;border-radius:8px;text-align:center;flex:1"><b id="o" style="font-size:30px;color:#3498db">0</b><br>訂單</div>
    </div>
    
    <h2>📦 商品 <button class="btn" onclick="addP()">+新增</button></h2>
    <table id="plist"><tr><th>名稱</th><th>價格</th><th>庫存</th></tr></table>
    
    <h2>👤 用戶 <button class="btn" onclick="init()">刷新</button></h2>
    <table id="ulist"><tr><th>用戶名</th><th>玄封幣</th><th>操作</th></tr></table>

    <script>
        var db = window.supabase.createClient('https://chjuzpbocdkdiyuuziye.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanV6cGJvY2RraXl1eml5ZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2NDgxODMyMDAsImV4cCI6MTk2Mzc1OTYwMH0.NItpZOQLPR4jshwOA_ZzV27mJI');

        async function init() {
            try {
                var ur = await db.from('users').select('id', { count: 'exact', head: true });
                var pr = await db.from('products').select('id', { count: 'exact', head: true });
                var or = await db.from('orders').select('id', { count: 'exact', head: true });
                document.getElementById('u').innerText = ur.count || 0;
                document.getElementById('p').innerText = pr.count || 0;
                document.getElementById('o').innerText = or.count || 0;
            } catch(e) { console.log(e); }

            var pl = await db.from('products').select('name,price,stock').order('created_at', { ascending: false });
            var ph = '';
            (pl.data || []).forEach(function(x) {
                ph += '<tr><td>' + x.name + '</td><td>' + x.price + '</td><td>' + x.stock + '</td></tr>';
            });
            document.getElementById('plist').innerHTML = ph || '<tr><td>無</td></tr>';

            var ul = await db.from('users').select('username,xuanfeng_coin,id').order('created_at', { ascending: false });
            var uh = '';
            (ul.data || []).forEach(function(x) {
                uh += '<tr><td>' + (x.username || '-') + '</td><td>' + (x.xuanfeng_coin || 0) + '</td><td><button class="btn" style="padding:5px 10px" onclick="editU(\'' + x.id + '\',' + (x.xuanfeng_coin||0) + ')">調整</button></td></tr>';
            });
            document.getElementById('ulist').innerHTML = uh || '<tr><td>無</td></tr>';
        }

        async function addP() {
            var name = prompt('商品名:');
            var price = prompt('價格:');
            var stock = prompt('庫存(-1無限):', '-1');
            if (name && price) {
                await db.from('products').insert({ name: name, price: parseInt(price), stock: parseInt(stock)||-1, is_visible: 1 });
                init();
            }
        }

        async function editU(id, coin) {
            var c = prompt('玄封幣:', coin);
            if (c !== null) {
                await db.from('users').update({ xuanfeng_coin: parseInt(c)||0 }).eq('id', id);
                init();
            }
        }

        init();
    </script>
</body>
</html>
