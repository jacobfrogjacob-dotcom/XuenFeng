<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄封商店 - 後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: bold; color: #3498db; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .stats { background: #fff; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; color: #3498db; }
        .stat-label { color: #888; }
        .card { background: #fff; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .card h2 { margin-bottom: 15px; }
        .btn { background: #3498db; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="location.reload()">⚙️ 玄封商店 後台</div>
        <button class="btn" onclick="location.href='index.html'">前台</button>
    </header>

    <div class="container">
        <div class="stats">
            <div><div class="stat-num" id="statUsers">0</div><div class="stat-label">用戶</div></div>
            <div><div class="stat-num" id="statProducts">0</div><div class="stat-label">商品</div></div>
            <div><div class="stat-num" id="statOrders">0</div><div class="stat-label">訂單</div></div>
        </div>

        <div class="card">
            <h2>📦 商品管理 <button class="btn" onclick="addProduct()">+ 新增</button></h2>
            <table><thead><tr><th>名稱</th><th>價格</th><th>庫存</th><th>操作</th></tr></thead><tbody id="productsList"></tbody></table>
        </div>

        <div class="card">
            <h2>📁 分類 <button class="btn" onclick="addCategory()">+ 新增</button></h2>
            <table><thead><tr><th>名稱</th><th>操作</th></tr></thead><tbody id="categoriesList"></tbody></table>
        </div>

        <div class="card">
            <h2>⚙️ 設置</h2>
            <div class="form-group"><label>網站名稱</label><input type="text" id="siteName"></div>
            <button class="btn" onclick="saveSettings()">保存</button>
        </div>

        <div class="card">
            <h2>👤 用戶管理 <button class="btn" onclick="loadUsers()">刷新</button></h2>
            <table><thead><tr><th>用戶名</th><th>信箱</th><th>玄封幣</th><th>操作</th></tr></thead><tbody id="usersList"></tbody></table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://chjuzpbocdkdiyuuziye.db.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanV6cGJvY2RraXl1eml5ZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2NDgxODMyMDAsImV4cCI6MTk2Mzc1OTYwMH0.NItpZOQLPR4jshwOA_ZzV27mJI';
        var db = window.db.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            loadStats();
            loadProducts();
            loadCategories();
            loadSettings();
        }

        async function loadStats() {
            try {
                const { count: u } = await db.from('users').select('*', { count: 'exact', head: true });
                const { count: p } = await db.from('products').select('*', { count: 'exact', head: true });
                const { count: o } = await db.from('orders').select('*', { count: 'exact', head: true });
                document.getElementById('statUsers').textContent = u || 0;
                document.getElementById('statProducts').textContent = p || 0;
                document.getElementById('statOrders').textContent = o || 0;
            } catch(e) {
                console.log('stats error:', e);
            }
        }

        async function loadProducts() {
            try {
                const { data } = await db.from('products').select('*').order('created_at', { ascending: false });
                document.getElementById('productsList').innerHTML = (data || []).map(p => `
                    <tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td>
                    <td><button class="btn" onclick="editProduct('${p.id}', '${p.name}', ${p.price}, ${p.stock})">編輯</button></td></tr>
                `).join('') || '<tr><td colspan="4">暫無商品</td></tr>';
            } catch(e) {
                document.getElementById('productsList').innerHTML = '<tr><td colspan="4">載入失敗</td></tr>';
            }
        }

        async function addProduct() {
            const name = prompt('商品名稱:');
            const price = prompt('價格:');
            const stock = prompt('庫存 (-1無限):', '-1');
            if (name && price) {
                await db.from('products').insert({ name, price: parseInt(price), stock: parseInt(stock)||-1, is_visible: 1 });
                loadProducts();
                loadStats();
            }
        }

        async function editProduct(id, name, price, stock) {
            const newName = prompt('商品名稱:', name);
            const newPrice = prompt('價格:', price);
            const newStock = prompt('庫存:', stock);
            if (newName) {
                await db.from('products').update({ name: newName, price: parseInt(newPrice)||0, stock: parseInt(newStock)||0 }).eq('id', id);
                loadProducts();
            }
        }

        async function loadCategories() {
            try {
                const { data } = await db.from('categories').select('*').order('name');
                document.getElementById('categoriesList').innerHTML = (data || []).map(c => `<tr><td>${c.name}</td><td></td></tr>`).join('') || '<tr><td>暫無分類</td></tr>';
            } catch(e) {
                document.getElementById('categoriesList').innerHTML = '<tr><td>載入失敗</td></tr>';
            }
        }

        async function addCategory() {
            const name = prompt('分類名稱:');
            if (name) {
                await db.from('categories').insert({ name });
                loadCategories();
            }
        }

        async function loadSettings() {
            try {
                const { data } = await db.from('settings').select('*').eq('id', 'site_name').single();
                if (data) document.getElementById('siteName').value = data.value;
            } catch(e) {
                document.getElementById('siteName').value = '玄封商店';
            }
        }

        async function saveSettings() {
            await db.from('settings').upsert({ id: 'site_name', value: document.getElementById('siteName').value });
            alert('保存成功');
        }

        async function loadUsers() {
            try {
                const { data } = await db.from('users').select('*').order('created_at', { ascending: false });
                document.getElementById('usersList').innerHTML = (data || []).map(u => `
                    <tr><td>${u.username||'-'}</td><td>${u.email}</td><td>${u.xuanfeng_coin||0}</td>
                    <td><button class="btn" onclick="editUser('${u.id}', ${u.xuanfeng_coin||0}, ${u.dianfeng_coin||0})">調整</button></td></tr>
                `).join('') || '<tr><td colspan="4">暫無用戶</td></tr>';
            } catch(e) {
                document.getElementById('usersList').innerHTML = '<tr><td colspan="4">載入失敗</td></tr>';
            }
        }

        async function editUser(id, xf, df) {
            const newXf = prompt('玄封幣:', xf);
            const newDf = prompt('巔峰幣:', df);
            if (newXf !== null) {
                await db.from('users').update({ xuanfeng_coin: parseInt(newXf)||0, dianfeng_coin: parseInt(newDf)||0 }).eq('id', id);
                loadUsers();
            }
        }

        init();
    </script>
</body>
</html>
