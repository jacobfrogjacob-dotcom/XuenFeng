<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄封商店 - 後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", Arial; background: #f5f5f5; }
        .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; }
        .logo { font-weight: bold; color: #3498db; cursor: pointer; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; background: #fff; padding: 20px; border-radius: 8px; }
        .stat-num { font-size: 28px; font-weight: bold; color: #3498db; }
        .card { background: #fff; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .btn { background: #3498db; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="init()">⚙️ 後台</div>
        <button class="btn" onclick="location.href='index.html'">前台</button>
    </header>
    <div class="container">
        <div class="stats">
            <div><div class="stat-num" id="u">0</div><div>用戶</div></div>
            <div><div class="stat-num" id="p">0</div><div>商品</div></div>
            <div><div class="stat-num" id="o">0</div><div>訂單</div></div>
        </div>
        <div class="card">
            <h2>商品 <button class="btn" onclick="addProduct()">+ 新增</button></h2>
            <table><thead><tr><th>名</th><th>價格</th><th>庫存</th></tr></thead><tbody id="plist"></tbody></table>
        </div>
        <div class="card">
            <h2>用戶</h2>
            <table><thead><tr><th>名</th><th>玄封幣</th><th>操作</th></tr></thead><tbody id="ulist"></tbody></table>
        </div>
    </div>
    <script>
        var db = window.supabase.createClient('https://chjuzpbocdkdiyuuziye.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanV6cGJvY2RraXl1eml5ZSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjQ4MTgzMjAwLCJleHAiOjE5NjM3NTk2MDB9.5nCbqWjZQxJQbXKTx9mB5tMQQU3P-VGWb5iT3zJN3JY');

        async function init() {
            try {
                var u = await db.from('users').select('*', { count: 'exact', head: true });
                var p = await db.from('products').select('*', { count: 'exact', head: true });
                var o = await db.from('orders').select('*', { count: 'exact', head: true });
                document.getElementById('u').innerText = u.count || 0;
                document.getElementById('p').innerText = p.count || 0;
                document.getElementById('o').innerText = o.count || 0;
            } catch(e) { console.log(e); }

            var products = await db.from('products').select('*').order('created_at', { ascending: false });
            var phtml = '';
            if (products.data) {
                products.data.forEach(function(x) {
                    phtml += '<tr><td>' + x.name + '</td><td>' + x.price + '</td><td>' + x.stock + '</td></tr>';
                });
            }
            document.getElementById('plist').innerHTML = phtml || '<tr><td>無</td></tr>';

            var users = await db.from('users').select('*').order('created_at', { ascending: false });
            var uhtml = '';
            if (users.data) {
                users.data.forEach(function(x) {
                    uhtml += '<tr><td>' + (x.username || '-') + '</td><td>' + (x.xuanfeng_coin || 0) + '</td><td><button class="btn" onclick="editUser(\'' + x.id + '\',' + (x.xuanfeng_coin||0) + ')">調整</button></td></tr>';
                });
            }
            document.getElementById('ulist').innerHTML = uhtml || '<tr><td>無</td></tr>';
        }

        async function addProduct() {
            var name = prompt('名:');
            var price = prompt('價格:');
            var stock = prompt('庫存:', '-1');
            if (name && price) {
                await db.from('products').insert({ name: name, price: parseInt(price), stock: parseInt(stock)||-1, is_visible: 1 });
                init();
            }
        }

        async function editUser(id, coin) {
            var c = prompt('玄封幣:', coin);
            if (c !== null) {
                await db.from('users').update({ xuanfeng_coin: parseInt(c)||0 }).eq('id', id);
                init();
            }
        }

        init();
    </script>
</body>
</html>
