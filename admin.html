<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄封商店 - 後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: bold; color: #e74c3c; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .sidebar { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .menu-item { background: #e74c3c; color: #fff; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .menu-item.active { background: #c0392b; }
        .card { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card h2 { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .btn { background: #3498db; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-danger { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .stat { background: #fff3cd; padding: 20px; border-radius: 8px; text-align: center; }
        .stat .num { font-size: 28px; font-weight: bold; color: #e74c3c; }
        .stat .label { color: #888; }
        .badge { padding: 3px 8px; border-radius: 3px; font-size: 12px; background: #27ae60; color: #fff; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">⚙️ 玄封商店 後台</div>
        <button class="btn" onclick="location.href='index.html'">返回前台</button>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="menu-item active" onclick="showTab('stats', this)">📊 統計</div>
            <div class="menu-item" onclick="showTab('products', this)">📦 商品</div>
            <div class="menu-item" onclick="showTab('categories', this)">📁 分類</div>
            <div class="menu-item" onclick="showTab('settings', this)">⚙️ 設置</div>
            <div class="menu-item" onclick="showTab('users', this)">👤 用戶</div>
            <div class="menu-item" onclick="showTab('coins', this)">💰 代幣</div>
        </div>

        <div id="statsTab" class="tab-content active">
            <div class="grid">
                <div class="stat"><div class="num" id="statUsers">0</div><div class="label">用戶</div></div>
                <div class="stat"><div class="num" id="statProducts">0</div><div class="label">商品</div></div>
                <div class="stat"><div class="num" id="statOrders">0</div><div class="label">訂單</div></div>
            </div>
        </div>

        <div id="productsTab" class="tab-content" style="display:none">
            <div class="card">
                <h2>商品管理 <button class="btn" onclick="showProductModal()">+ 新增</button></h2>
                <table><thead><tr><th>名稱</th><th>分類</th><th>價格</th><th>庫存</th><th>操作</th></tr></thead><tbody id="productsList"></tbody></table>
            </div>
        </div>

        <div id="categoriesTab" class="tab-content" style="display:none">
            <div class="card">
                <h2>分類管理 <button class="btn" onclick="showCatModal()">+ 新增</button></h2>
                <table><thead><tr><th>名稱</th><th>操作</th></tr></thead><tbody id="categoriesList"></tbody></table>
            </div>
        </div>

        <div id="settingsTab" class="tab-content" style="display:none">
            <div class="card">
                <h2>網站設置</h2>
                <div class="form-group"><label>網站名稱</label><input type="text" id="siteName"></div>
                <div class="form-group"><label>玄封幣圖標</label><input type="text" id="xfIcon" placeholder="如: 玄封幣.png"></div>
                <div class="form-group"><label>巔峰幣圖標</label><input type="text" id="dfIcon" placeholder="如: 巔峰幣.png"></div>
                <button class="btn" onclick="saveSettings()">保存</button>
            </div>
        </div>

        <div id="usersTab" class="tab-content" style="display:none">
            <div class="card">
                <h2>用戶管理</h2>
                <table><thead><tr><th>用戶名</th><th>信箱</th><th>玄封幣</th><th>巔峰幣</th><th>操作</th></tr></thead><tbody id="usersList"></tbody></table>
            </div>
        </div>

        <div id="coinsTab" class="tab-content" style="display:none">
            <div class="card">
                <h2>充值代幣</h2>
                <div class="form-group"><label>搜尋用戶</label><input type="text" id="searchUser" oninput="searchUser()"></div>
                <div id="searchResult"></div>
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        let products = [], categories = [];

        async function init() {
            loadStats();
            loadProducts();
            loadCategories();
            loadSettings();
            loadUsers();
        }

        function showTab(tab, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            el.classList.add('active');
            document.getElementById(tab + 'Tab').style.display = 'block';
        }

        async function loadStats() {
            const { count: users } = await supabaseClient.from('users').select('*', { count: 'exact', head: true });
            const { count: products } = await supabaseClient.from('products').select('*', { count: 'exact', head: true });
            const { count: orders } = await supabaseClient.from('orders').select('*', { count: 'exact', head: true });
            document.getElementById('statUsers').textContent = users || 0;
            document.getElementById('statProducts').textContent = products || 0;
            document.getElementById('statOrders').textContent = orders || 0;
        }

        async function loadProducts() {
            const { data } = await supabaseClient.from('products').select('*, categories(name)').order('sort');
            products = data || [];
            document.getElementById('productsList').innerHTML = products.map(p => `<tr><td>${p.name}</td><td>${p.categories?.name||'-'}</td><td>${p.price}</td><td>${p.stock}</td><td><button class="btn" onclick="editProduct('${p.id}')">編輯</button></td></tr>`).join('');
        }

        async function loadCategories() {
            const { data } = await supabaseClient.from('categories').select('*').order('sort');
            categories = data || [];
            document.getElementById('categoriesList').innerHTML = categories.map(c => `<tr><td>${c.name}</td><td><button class="btn" onclick="editCategory('${c.id}')">編輯</button></td></tr>`).join('');
        }

        async function loadSettings() {
            const { data } = await supabaseClient.from('settings').select('*');
            if (data) {
                data.forEach(s => {
                    if (s.id === 'site_name') document.getElementById('siteName').value = s.value;
                    if (s.id === 'xuanfeng_icon') document.getElementById('xfIcon').value = s.value;
                    if (s.id === 'dianfeng_icon') document.getElementById('dfIcon').value = s.value;
                });
            }
        }

        async function saveSettings() {
            await supabaseClient.from('settings').upsert({ id: 'site_name', value: document.getElementById('siteName').value });
            await supabaseClient.from('settings').upsert({ id: 'xuanfeng_icon', value: document.getElementById('xfIcon').value });
            await supabaseClient.from('settings').upsert({ id: 'dianfeng_icon', value: document.getElementById('dfIcon').value });
            alert('保存成功');
        }

        async function loadUsers() {
            const { data } = await supabaseClient.from('users').select('*').order('created_at', { ascending: false });
            document.getElementById('usersList').innerHTML = (data || []).map(u => `<tr><td>${u.username||'-'}</td><td>${u.email}</td><td>${u.xuanfeng_coin||0}</td><td>${u.dianfeng_coin||0}</td><td><button class="btn" onclick="editUser('${u.id}')">調整</button></td></tr>`).join('');
        }

        function showProductModal(id = null) {
            const name = prompt('商品名稱:');
            const price = prompt('價格:');
            if (!name || !price) return;
            const data = { name, price: parseInt(price), is_visible: 1, sort: products.length };
            if (id) data.id = id;
            supabaseClient.from('products').upsert(data).then(() => { loadProducts(); loadStats(); });
        }

        function editProduct(id) { showProductModal(id); }

        function showCatModal(id = null) {
            const name = prompt('分類名稱:');
            if (!name) return;
            const data = { name, sort: categories.length };
            if (id) data.id = id;
            supabaseClient.from('categories').upsert(data).then(() => loadCategories());
        }

        function editCategory(id) { showCatModal(id); }

        function editUser(id) {
            const xf = prompt('玄封幣:');
            const df = prompt('巔峰幣:');
            if (xf === null) return;
            supabaseClient.from('users').update({ xuanfeng_coin: parseInt(xf)||0, dianfeng_coin: parseInt(df)||0 }).eq('id', id).then(() => loadUsers());
        }

        async function searchUser() {
            const q = document.getElementById('searchUser').value;
            if (q.length < 2) { document.getElementById('searchResult').innerHTML = ''; return; }
            const { data } = await supabaseClient.from('users').select('*').ilike('username', `%${q}%`);
            document.getElementById('searchResult').innerHTML = (data || []).map(u => `<div style="padding:10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center">
                <div>${u.username||u.email} <small>(${u.xuanfeng_coin||0} 玄封, ${u.dianfeng_coin||0} 巔峰)</small></div>
                <div><input type="number" id="c_${u.id}" style="width:60px"><button class="btn" onclick="charge('${u.id}')">充</button></div>
            </div>`).join('');
        }

        function charge(id) {
            const amount = parseInt(document.getElementById('c_' + id).value) || 0;
            supabaseClient.from('users').select('*').eq('id', id).single().then(({ data }) => {
                supabaseClient.from('users').update({ xuanfeng_coin: (data?.xuanfeng_coin || 0) + amount }).eq('id', id);
                alert('充值成功');
                loadUsers();
            });
        }

        init();
    </script>
</body>
</html>
